# Deploy to the Dev environment (Render + Supabase).
# Runs only after the CI workflow succeeds on `main`. Bound to the GitHub `dev`
# Environment, so it can read the deployment secrets. GitHub is the source of
# truth for env: this job applies migrations to Supabase, then pushes the runtime
# env to the Render service via the Render API and triggers the deploy.
name: Deploy (Dev)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    # Only deploy when the triggering CI run passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy the exact commit that passed CI.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile # postinstall runs `prisma generate`

      # 1) Migrate Supabase. `prisma migrate deploy` uses DIRECT_URL (session pooler).
      - name: Migrate Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: pnpm --filter @fundi/api exec prisma migrate deploy

      # 2) Push the runtime env to Render (GitHub = source of truth), then deploy.
      #    The env-vars PUT replaces the full set, so NODE_VERSION is included too.
      #    PORT is intentionally omitted — Render injects it.
      - name: Sync env to Render and deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          set -euo pipefail

          # Build the env-var payload with jq so secret values (which contain
          # :, /, ?, & ...) are quoted safely — never string-interpolated.
          payload=$(jq -n \
            --arg node "24.18.0" \
            --arg db "$DATABASE_URL" \
            --arg direct "$DIRECT_URL" \
            --arg cors "$CORS_ORIGINS" \
            '[{key:"NODE_VERSION",value:$node},
              {key:"DATABASE_URL",value:$db},
              {key:"DIRECT_URL",value:$direct},
              {key:"CORS_ORIGINS",value:$cors}]')

          echo "Syncing env vars to Render service $RENDER_SERVICE_ID"
          curl -fsS -X PUT \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload" > /dev/null

          echo "Triggering deploy"
          curl -fsS -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' > /dev/null

          echo "Deploy triggered. Watch progress in the Render dashboard."
